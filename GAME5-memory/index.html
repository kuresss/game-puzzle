<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>神経衰弱</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🃏 神経衰弱</h1>
      <div class="scores" aria-label="スコア">
        <div class="score-box">
          <span class="score-label">手数</span>
          <span class="score-value" id="moves">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">ペア</span>
          <span class="score-value" id="pairs">0 / 8</span>
        </div>
        <div class="score-box">
          <span class="score-label">ベスト</span>
          <span class="score-value" id="best-moves">-</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <select id="difficulty" aria-label="難易度">
        <option value="easy">かんたん</option>
        <option value="normal" selected>ふつう</option>
        <option value="hard">むずかしい</option>
        <option value="oni">🔴 鬼</option>
      </select>
      <select id="theme" aria-label="テーマ">
        <option value="animals" selected>動物</option>
        <option value="food">食べ物</option>
        <option value="nature">自然</option>
      </select>
      <button id="new-game" type="button">新しいゲーム</button>
      <button id="help-btn" type="button" aria-label="遊び方">？</button>
      <button id="stats-btn" type="button" aria-label="統計">📊</button>
      <button id="mute-btn" type="button" aria-label="ミュート">🔊</button>
      <button id="theme-btn" type="button" aria-label="テーマ切替">🌓</button>
      <button id="fs-btn" type="button" aria-label="フルスクリーン">⛶</button>
    </div>

    <p class="status" id="status" aria-live="polite"></p>
    <button id="share-btn" type="button" hidden>📋 シェア</button>

    <div class="grid" id="grid" aria-label="神経衰弱グリッド" role="grid"></div>
  </div>

  <!-- 遊び方モーダル -->
  <div class="modal-overlay" id="howto-modal" role="dialog" aria-modal="true" aria-labelledby="howto-title" hidden>
    <div class="modal">
      <h2 id="howto-title">遊び方</h2>
      <p>カードを2枚めくって同じ絵柄を探しましょう！</p>
      <ul class="howto-list">
        <li>👆 カードをクリックしてめくる</li>
        <li>✅ 同じ絵柄なら残る</li>
        <li>❌ 違う絵柄なら裏返る</li>
        <li>🏆 少ない手数でクリアを目指そう</li>
      </ul>
      <p>8組のペアを全て見つけたらクリア！</p>
      <button id="howto-close" type="button">はじめる</button>
    </div>
  </div>

  <!-- クリアモーダル -->
  <div class="modal-overlay" id="clear-modal" role="dialog" aria-modal="true" aria-labelledby="clear-title" hidden>
    <div class="modal">
      <h2 id="clear-title">🎉 クリア！</h2>
      <p id="clear-moves-text"></p>
      <p id="clear-best-text" hidden>🏆 ベスト手数更新！</p>
      <div class="modal-btns">
        <button id="clear-next" type="button">もう一度</button>
        <button id="clear-close" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 統計モーダル -->
  <div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title" hidden>
    <div class="modal">
      <h2 id="stats-title">📊 統計</h2>
      <table class="stats-table" style="width:100%;border-collapse:collapse;">
        <tbody>
          <tr><td>プレイ回数</td><td id="stats-played">0</td></tr>
          <tr><td>勝利数</td><td id="stats-wins">0</td></tr>
          <tr><td>勝率</td><td id="stats-winrate">0%</td></tr>
          <tr><td>現在の連勝</td><td id="stats-streak">0</td></tr>
          <tr><td>最長連勝</td><td id="stats-best-streak">0</td></tr>
        </tbody>
      </table>
      <button id="stats-close" type="button">閉じる</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
