<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChromaFlow — 流体パズル</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1b2a">
</head>
<body data-theme="dark">

<div id="app">
  <header id="header">
    <div id="header-left">
      <span id="game-title">ChromaFlow</span>
      <span id="stage-title">読み込み中…</span>
    </div>
    <div id="header-right">
      <button id="btn-pause" title="一時停止">⏸</button>
      <button id="btn-mute"  title="ミュート">🔊</button>
      <button id="btn-fullscreen" title="フルスクリーン">⛶</button>
    </div>
  </header>

  <div id="score-area">
    <div id="score-track">
      <div id="score-bar"></div>
    </div>
    <span id="score-label">0%</span>
    <span id="timer">残り: 90s</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="no-webgl" style="display:none">
      WebGL2 に対応していないブラウザでは遊べません。<br>
      Chrome / Firefox / Safari 最新版をお試しください。
    </div>
  </div>

  <div id="palette-wrap">
    <div id="palette"></div>
    <div id="action-btns">
      <button id="btn-hint">ヒント</button>
      <button id="btn-share" style="display:none">📋 シェア</button>
    </div>
  </div>
</div>

<!-- クリアモーダル -->
<div id="modal-clear" style="display:none">
  <div id="modal-box">
    <h2>🎨 クリア！</h2>
    <p id="modal-score"></p>
    <button id="modal-share" onclick="document.getElementById('btn-share').click();document.getElementById('modal-clear').style.display='none'">
      📋 シェアして保存
    </button>
    <button id="modal-close" onclick="document.getElementById('modal-clear').style.display='none'">
      閉じる
    </button>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
