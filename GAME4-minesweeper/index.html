<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>マインスウィーパー</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">💣 マイン</h1>
      <div class="scores" aria-label="スコア">
        <div class="score-box">
          <span class="score-label">残り地雷</span>
          <span class="score-value" id="mine-count">10</span>
        </div>
        <div class="score-box">
          <span class="score-label">タイム</span>
          <span class="score-value" id="timer">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">ベスト</span>
          <span class="score-value" id="best-time">-</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <select id="difficulty" aria-label="難易度">
        <option value="easy">かんたん (9×9)</option>
        <option value="normal">ふつう (16×16)</option>
        <option value="hard">むずかしい (20×16)</option>
        <option value="oni">🔴 鬼 (30×20)</option>
      </select>
      <button id="new-game" type="button">新しいゲーム</button>
      <button id="help-btn" type="button" aria-label="遊び方">？</button>
      <button id="mute-btn" type="button" aria-label="ミュート">🔊</button>
      <button id="theme-btn" type="button" aria-label="テーマ切替">🌓</button>
      <button id="fs-btn" type="button" aria-label="フルスクリーン">⛶</button>
      <button id="stats-btn" type="button" aria-label="統計">📊</button>
      <button id="share-btn" type="button" hidden>📋 シェア</button>
    </div>

    <p class="status" id="status" aria-live="polite"></p>

    <div class="grid" id="grid" aria-label="マインスウィーパーグリッド" role="grid"></div>

    <p class="hint">左クリック: 開く　右クリック / 長押し: 旗</p>
  </div>

  <!-- 遊び方モーダル -->
  <div class="modal-overlay" id="howto-modal" role="dialog" aria-modal="true" aria-labelledby="howto-title" hidden>
    <div class="modal">
      <h2 id="howto-title">遊び方</h2>
      <p>難易度に応じたマスに地雷が隠れています。</p>
      <ul class="howto-list">
        <li>👆 <strong>左クリック</strong>: マスを開く</li>
        <li>🚩 <strong>右クリック / 長押し</strong>: 旗を立てる</li>
        <li>🔢 数字 = 周囲の地雷の数</li>
        <li>💣 地雷を開いたらゲームオーバー！</li>
      </ul>
      <p>全ての安全なマスを開けばクリア！</p>
      <button id="howto-close" type="button">はじめる</button>
    </div>
  </div>

  <!-- クリアモーダル -->
  <div class="modal-overlay" id="clear-modal" role="dialog" aria-modal="true" aria-labelledby="clear-title" hidden>
    <div class="modal">
      <h2 id="clear-title">🎉 クリア！</h2>
      <p id="clear-time-text"></p>
      <p id="clear-best-text" hidden>🏆 ベストタイム更新！</p>
      <div class="modal-btns">
        <button id="clear-next" type="button">もう一度</button>
        <button id="clear-close" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <!-- ゲームオーバーモーダル -->
  <div class="modal-overlay" id="over-modal" role="dialog" aria-modal="true" aria-labelledby="over-title" hidden>
    <div class="modal">
      <h2 id="over-title">💣 ゲームオーバー</h2>
      <p>地雷を踏んでしまいました！</p>
      <button id="over-new" type="button">もう一度</button>
    </div>
  </div>

  <!-- 統計モーダル -->
  <div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title" hidden>
    <div class="modal">
      <h2 id="stats-title">📊 統計</h2>
      <table class="stats-table">
        <tbody>
          <tr><th>プレイ回数</th><td id="stats-played">0</td></tr>
          <tr><th>勝利数</th><td id="stats-wins">0</td></tr>
          <tr><th>勝率</th><td id="stats-rate">0%</td></tr>
          <tr><th>現在の連勝</th><td id="stats-streak">0</td></tr>
          <tr><th>最長連勝</th><td id="stats-best">0</td></tr>
        </tbody>
      </table>
      <button id="stats-close" type="button">閉じる</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
