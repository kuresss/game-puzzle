<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>リバーシ</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">⚫ リバーシ</h1>
      <div class="scores">
        <div class="score-box black-box">
          <span class="score-label">⚫ あなた</span>
          <span class="score-value" id="black-count">2</span>
        </div>
        <div class="score-box white-box">
          <span class="score-label">⚪ CPU</span>
          <span class="score-value" id="white-count">2</span>
        </div>
        <div class="score-box">
          <span class="score-label">ベスト</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <select id="difficulty" aria-label="難易度">
        <option value="easy">かんたん</option>
        <option value="normal" selected>ふつう</option>
        <option value="hard">むずかしい</option>
        <option value="oni">🔴 鬼</option>
      </select>
      <button id="new-game" type="button">新しいゲーム</button>
      <button id="undo-btn" type="button" disabled>元に戻す</button>
      <button id="help-btn" type="button" aria-label="遊び方">？</button>
      <button id="stats-btn" type="button" aria-label="統計">📊</button>
      <button id="theme-btn" type="button" aria-label="テーマ切替">🌓</button>
      <button id="fs-btn" type="button" aria-label="フルスクリーン">⛶</button>
      <button id="mute-btn" type="button" aria-label="ミュート">🔊</button>
    </div>

    <p class="status" id="status" aria-live="polite"></p>

    <div class="grid" id="grid" aria-label="リバーシ盤面" role="grid"></div>
  </div>

  <!-- 統計モーダル -->
  <div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title" hidden>
    <div class="modal">
      <h2 id="stats-title">📊 統計</h2>
      <table class="stats-table">
        <tr><th>プレイ回数</th><td id="stat-played">0</td></tr>
        <tr><th>勝利</th><td id="stat-wins">0</td></tr>
        <tr><th>敗北</th><td id="stat-losses">0</td></tr>
        <tr><th>引き分け</th><td id="stat-draws">0</td></tr>
        <tr><th>勝率</th><td id="stat-winrate">0%</td></tr>
        <tr><th>最長連勝</th><td id="stat-streak">0</td></tr>
      </table>
      <button id="stats-close" type="button">閉じる</button>
    </div>
  </div>

  <!-- 遊び方モーダル -->
  <div class="modal-overlay" id="howto-modal" role="dialog" aria-modal="true" aria-labelledby="howto-title" hidden>
    <div class="modal">
      <h2 id="howto-title">遊び方</h2>
      <p>相手の石を挟んでひっくり返そう！</p>
      <ul class="howto-list">
        <li>⚫ あなたは黒、CPUは白</li>
        <li>👆 緑の点が置ける場所</li>
        <li>🔄 相手の石を縦・横・斜めに挟むとひっくり返せる</li>
        <li>🏁 置ける場所がなければパス</li>
        <li>🏆 両方が置けなくなったらゲーム終了</li>
      </ul>
      <button id="howto-close" type="button">はじめる</button>
    </div>
  </div>

  <!-- 結果モーダル -->
  <div class="modal-overlay" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title" hidden>
    <div class="modal">
      <h2 id="result-title"></h2>
      <p id="result-text"></p>
      <p id="result-best-text" hidden>🏆 ベストスコア更新！</p>
      <div class="modal-btns">
        <button id="share-btn" type="button" hidden>📋 シェア</button>
        <button id="result-new" type="button">もう一度</button>
        <button id="result-close" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
