<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヒット＆ブロー</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🔢 ヒット＆ブロー</h1>
      <div class="scores" aria-label="スコア">
        <div class="score-box">
          <span class="score-label">残り</span>
          <span class="score-value" id="attempts-left">8</span>
        </div>
        <div class="score-box">
          <span class="score-label">ベスト</span>
          <span class="score-value" id="best-attempts">-</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <select id="difficulty" aria-label="難易度">
        <option value="easy">かんたん</option>
        <option value="normal" selected>ふつう</option>
        <option value="hard">むずかしい</option>
        <option value="oni">🔴 鬼</option>
      </select>
      <button id="new-game" type="button">新しいゲーム</button>
      <button id="help-btn" type="button" aria-label="遊び方">？</button>
      <button id="stats-btn" type="button" aria-label="統計">📊</button>
      <button id="theme-btn" type="button" aria-label="テーマ切替">🌓</button>
      <button id="fs-btn" type="button" aria-label="フルスクリーン">⛶</button>
      <button id="mute-btn" type="button" aria-label="ミュート">🔊</button>
    </div>

    <p class="status" id="status" aria-live="polite"></p>
    <button id="share-btn" type="button" hidden>📋 シェア</button>

    <!-- 入力エリア -->
    <div class="input-area" id="input-area">
      <input id="guess-input" type="text" inputmode="numeric" maxlength="5"
        placeholder="数字を入力" autocomplete="off" aria-label="予想する数字" />
      <button id="submit-btn" type="button">送信</button>
    </div>

    <!-- 履歴 -->
    <div class="history" id="history" aria-label="予想履歴" aria-live="polite"></div>
  </div>

  <!-- 遊び方モーダル -->
  <div class="modal-overlay" id="howto-modal" role="dialog" aria-modal="true" aria-labelledby="howto-title" hidden>
    <div class="modal">
      <h2 id="howto-title">遊び方</h2>
      <p>コンピュータが選んだ秘密の数字を当てよう！（全桁異なる）</p>
      <div class="howto-example">
        <p>答えが <strong>1234</strong> の場合：</p>
        <p>予想 <strong>1357</strong> → <span class="tag hit">1HIT</span><span class="tag blow">1BLOW</span></p>
        <p class="small">1が1HIT、3が1BLOW（数字はあるが位置違い）</p>
      </div>
      <ul class="howto-list">
        <li>🎯 <strong>HIT</strong>: 数字も位置も正解</li>
        <li>💨 <strong>BLOW</strong>: 数字は正解、位置が違う</li>
      </ul>
      <button id="howto-close" type="button">はじめる</button>
    </div>
  </div>

  <!-- クリアモーダル -->
  <div class="modal-overlay" id="clear-modal" role="dialog" aria-modal="true" aria-labelledby="clear-title" hidden>
    <div class="modal">
      <h2 id="clear-title">🎉 正解！</h2>
      <p id="clear-text"></p>
      <p id="clear-best-text" hidden>🏆 ベスト更新！</p>
      <div class="modal-btns">
        <button id="clear-next" type="button">もう一度</button>
        <button id="clear-close" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 失敗モーダル -->
  <div class="modal-overlay" id="fail-modal" role="dialog" aria-modal="true" aria-labelledby="fail-title" hidden>
    <div class="modal">
      <h2 id="fail-title">😢 残念！</h2>
      <p id="fail-answer-text"></p>
      <button id="fail-new" type="button">もう一度</button>
    </div>
  </div>

  <!-- 統計モーダル -->
  <div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title" hidden>
    <div class="modal">
      <h2 id="stats-title">📊 統計</h2>
      <table class="stats-table">
        <tbody>
          <tr><th>プレイ回数</th><td id="stats-played">0</td></tr>
          <tr><th>正解数</th><td id="stats-wins">0</td></tr>
          <tr><th>正解率</th><td id="stats-rate">0%</td></tr>
          <tr><th>現在の連勝</th><td id="stats-streak">0</td></tr>
          <tr><th>最長連勝</th><td id="stats-best-streak">0</td></tr>
        </tbody>
      </table>
      <button id="stats-close" type="button">閉じる</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
