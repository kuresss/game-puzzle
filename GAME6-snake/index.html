<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>スネーク</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🐍 スネーク</h1>
      <div class="scores" aria-label="スコア">
        <div class="score-box">
          <span class="score-label">スコア</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">ベスト</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <button id="new-game" type="button">新しいゲーム</button>
      <select id="difficulty" aria-label="難易度">
        <option value="easy">かんたん</option>
        <option value="normal" selected>ふつう</option>
        <option value="hard">むずかしい</option>
        <option value="oni">🔴 鬼</option>
      </select>
      <button id="pause-btn" type="button" hidden>⏸</button>
      <button id="share-btn" type="button" hidden>📋 シェア</button>
      <button id="mute-btn" type="button" aria-label="ミュート">🔊</button>
      <button id="theme-btn" type="button" aria-label="テーマ切替">🌓</button>
      <button id="fs-btn" type="button" aria-label="フルスクリーン">⛶</button>
      <button id="stats-btn" type="button" aria-label="統計">📊</button>
      <button id="help-btn" type="button" aria-label="遊び方">？</button>
    </div>

    <p class="status" id="status" aria-live="polite"></p>

    <div class="grid" id="grid" aria-label="スネークグリッド">
      <div id="pause-overlay" class="pause-overlay" hidden>
        <p>⏸ 一時停止中</p>
        <p>Escキーまたはボタンで再開</p>
      </div>
    </div>

    <div class="dpad" aria-label="操作パッド">
      <button class="dpad-btn dpad-up"   id="btn-up"    type="button" aria-label="上">▲</button>
      <div class="dpad-mid">
        <button class="dpad-btn dpad-left"  id="btn-left"  type="button" aria-label="左">◀</button>
        <button class="dpad-btn dpad-right" id="btn-right" type="button" aria-label="右">▶</button>
      </div>
      <button class="dpad-btn dpad-down"  id="btn-down"  type="button" aria-label="下">▼</button>
    </div>
  </div>

  <!-- 遊び方モーダル -->
  <div class="modal-overlay" id="howto-modal" role="dialog" aria-modal="true" aria-labelledby="howto-title" hidden>
    <div class="modal">
      <h2 id="howto-title">遊び方</h2>
      <p>スネークを操作してエサを食べよう！</p>
      <ul class="howto-list">
        <li>🍎 <strong>赤いエサ</strong>を食べるとスコアUP＆成長</li>
        <li>⬆️ 矢印キー / WASD / スワイプで操作</li>
        <li>💀 壁や自分の体にぶつかるとゲームオーバー</li>
        <li>⚡ エサを食べるほどスピードUP！</li>
        <li>⏸ Escキーまたはボタンで一時停止</li>
      </ul>
      <button id="howto-close" type="button">はじめる</button>
    </div>
  </div>

  <!-- ゲームオーバーモーダル -->
  <div class="modal-overlay" id="over-modal" role="dialog" aria-modal="true" aria-labelledby="over-title" hidden>
    <div class="modal">
      <h2 id="over-title">💀 ゲームオーバー</h2>
      <p id="over-score-text"></p>
      <p id="over-best-text" hidden>🏆 ベストスコア更新！</p>
      <button id="over-new" type="button">もう一度</button>
    </div>
  </div>

  <!-- 統計モーダル -->
  <div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title" hidden>
    <div class="modal">
      <h2 id="stats-title">📊 統計</h2>
      <table class="stats-table">
        <tr><th>プレイ回数</th><td id="stats-played">0</td></tr>
        <tr><th>ハイスコア</th><td id="stats-high">0</td></tr>
        <tr><th>平均スコア</th><td id="stats-avg">0</td></tr>
      </table>
      <button id="stats-close" type="button">閉じる</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
